services:
  jenkins-controller:
    image: jenkins/jenkins:lts
    container_name: jenkins-controller
    restart: unless-stopped

    ports:
      - "9090:8080"
      - "51000:50000"
    volumes:
      - /home/fenitra/jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
