- name: Install Samba and SSSD
  ansible.builtin.apt:
    name:
      - samba
      - sssd
      - sssd-ldap
      - libpam-sss
      - libnss-sss
      - python3-ldap
    state: present
    update_cache: yes

- name: Deploy smb.conf
  ansible.builtin.template:
    src: smb.conf.j2
    dest: /etc/samba/smb.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart Samba

- name: Deploy sssd.conf
  ansible.builtin.template:
    src: sssd.conf.j2
    dest: /etc/sssd/sssd.conf
    owner: root
    group: root
    mode: "0600"
  notify: Restart SSSD

- name: Create share directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: "{{ item.mode }}"
  loop:
    - { path: /srv/shares/public, mode: "2775" }
    - { path: /srv/shares/secure, mode: "2770" }

- name: Ensure SSSD is started and enabled
  ansible.builtin.service:
    name: sssd
    state: started
    enabled: true

- name: Ensure Samba is started and enabled
  ansible.builtin.service:
    name: smbd
    state: started
    enabled: true

- name: Add users to Samba tdbsam
  ansible.builtin.shell: |
    if ! pdbedit -L | grep -q "^{{ item.user }}:"; then
      printf '%s\n%s\n' '{{ item.password }}' '{{ item.password }}' | smbpasswd -a -s {{ item.user }}
    fi
  loop:
    - { user: linuxuser,   password: "{{ vault_linuxuser_password }}" }
    - { user: windowsuser, password: "{{ vault_windowsuser_password }}" }
  no_log: true
  changed_when: false

- name: Enable Samba users
  ansible.builtin.shell: smbpasswd -e {{ item }}
  loop:
    - linuxuser
    - windowsuser
  changed_when: false