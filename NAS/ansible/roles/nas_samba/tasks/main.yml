- name: Install Samba, SSSD and ACL
  ansible.builtin.apt:
    name:
      - samba
      - sssd
      - sssd-ldap
      - sssd-tools
      - libpam-sss
      - libnss-sss
      - acl
    state: present
    update_cache: true

- name: Disable NSCD
  ansible.builtin.service:
    name: nscd
    state: stopped
    enabled: false

- name: Deploy smb.conf
  ansible.builtin.template:
    src: smb.conf.j2
    dest: /etc/samba/smb.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart Samba

- name: Deploy sssd.conf
  ansible.builtin.template:
    src: sssd.conf.j2
    dest: /etc/sssd/sssd.conf
    owner: root
    group: root
    mode: "0600"
  notify: Restart SSSD
- name: Create share directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: /srv/shares/public, group: linux, mode: "2775" }
    - { path: /srv/shares/secure, group: admins, mode: "0771" }
    - { path: /srv/shares/secure/linuxuser, group: admins, mode: "0770" }
    - { path: /srv/shares/secure/windowsuser, group: windows, mode: "0770" }

- name: Set owner on personal directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: "{{ item.owner }}"
  loop:
    - { path: /srv/shares/secure/linuxuser, owner: linuxuser }
    - { path: /srv/shares/secure/windowsuser, owner: windowsuser }

- name: Deploy dfree script
  ansible.builtin.copy:
    content: |
      #!/bin/bash
      df -k /srv/shares/ | tail -1 | awk '{print $2" "$4}'
    dest: /usr/local/bin/dfree
    owner: root
    group: root
    mode: "0755"

- name: Add users to Samba tdbsam
  ansible.builtin.shell: |
    set -o pipefail
    if ! pdbedit -L | grep -q "^{{ item.user }}:"; then
      printf '%s\n%s\n' '{{ item.password }}' '{{ item.password }}' | smbpasswd -a -s {{ item.user }}
    fi
    smbpasswd -e {{ item.user }}
  args:
    executable: /bin/bash
  loop:
    - { user: linuxuser, password: "{{ vault_linuxuser_password }}" }
    - { user: windowsuser, password: "{{ vault_windowsuser_password }}" }
  no_log: true
  changed_when: false

- name: Ensure SSSD is started and enabled
  ansible.builtin.service:
    name: sssd
    state: started
    enabled: true

- name: Ensure Samba is started and enabled
  ansible.builtin.service:
    name: smbd
    state: started
    enabled: true

- name: Set ACL on public share
  ansible.posix.acl:
    path: /srv/shares/public
    entity: "{{ item }}"
    etype: group
    permissions: rwx
    state: present
  loop:
    - linux
    - windows

- name: Set default ACL on public share
  ansible.posix.acl:
    path: /srv/shares/public
    entity: "{{ item }}"
    etype: group
    permissions: rwx
    default: true
    state: present
  loop:
    - linux
    - windows
