- name: Fetch CA certificate from LDAP
  ansible.builtin.fetch:
    src: "{{ ldap_ca_cert_path }}"
    dest: /tmp/ldap-ca.crt
    flat: true
  delegate_to: ldap.local

- name: Create CA trust directory
  ansible.builtin.file:
    path: "{{ nas_ca_trust_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Distribute CA certificate
  ansible.builtin.copy:
    src: /tmp/ldap-ca.crt
    dest: "{{ nas_ca_trust_dir }}/ldap-ca.crt"
    owner: root
    group: root
    mode: "0644"
  notify: Update CA trust store
