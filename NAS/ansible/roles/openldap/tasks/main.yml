- name: Configure debconf answers before install
  ansible.builtin.debconf:
    name: slapd
    question: "{{ item.question }}"
    value: "{{ item.value }}"
    vtype: "{{ item.vtype }}"
  loop:
    - { question: 'slapd/domain',       value: '{{ ldap_domain }}',        vtype: 'string' }
    - { question: 'slapd/organization', value: '{{ ldap_org }}',            vtype: 'string' }
    - { question: 'slapd/password1',    value: '{{ ldap_admin_password }}', vtype: 'password' }
    - { question: 'slapd/password2',    value: '{{ ldap_admin_password }}', vtype: 'password' }
  no_log: true

- name: Install slapd and ldap-utils
  ansible.builtin.apt:
    name:
      - slapd
      - ldap-utils
      - python3-cryptography
    state: present
    update_cache: yes

- name: Ensure slapd is started and enabled
  ansible.builtin.service:
    name: slapd
    state: started
    enabled: true

- name: Create SSL directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ ca_dir }}"
    - "{{ cert_dir }}"
    - "{{ key_dir }}"

- name: Generate CA private key
  community.crypto.openssl_privatekey:
    path: "{{ ldap_ca_key_path }}"
    size: 4096
    mode: "0600"

- name: Generate CA certificate signing request
  community.crypto.openssl_csr:
    path: /tmp/ca.csr
    privatekey_path: "{{ ldap_ca_key_path }}"
    common_name: "CA-{{ cert_common_name }}"
    organization_name: "{{ cert_org }}"
    country_name: "{{ cert_country }}"
    basic_constraints:
      - "CA:TRUE"
    basic_constraints_critical: true
    key_usage:
      - digitalSignature
      - cRLSign
      - keyCertSign
    key_usage_critical: true

- name: Generate self-signed CA certificate
  community.crypto.x509_certificate:
    path: "{{ ldap_ca_cert_path }}"
    privatekey_path: "{{ ldap_ca_key_path }}"
    csr_path: /tmp/ca.csr
    provider: selfsigned
    selfsigned_not_after: "+{{ cert_days }}d"
    
- name: Generate LDAP server private key
  community.crypto.openssl_privatekey:
    path: "{{ ldap_key_path }}"
    size: 4096
    mode: "0600"

- name: Deploy openssl config template
  ansible.builtin.template:
    src: openssl.cnf.j2
    dest: /tmp/openssl.cnf
    mode: "0644"

- name: Generate LDAP certificate signing request
  community.crypto.openssl_csr:
    path: /tmp/ldap.csr
    privatekey_path: "{{ ldap_key_path }}"
    common_name: "{{ cert_common_name }}"
    organization_name: "{{ cert_org }}"
    country_name: "{{ cert_country }}"
    subject_alt_name:
      - "DNS:{{ cert_common_name }}"
      - "IP:{{ ansible_host }}"

- name: Sign LDAP certificate with CA
  community.crypto.x509_certificate:
    path: "{{ ldap_cert_path }}"
    csr_path: /tmp/ldap.csr
    provider: ownca
    ownca_path: "{{ ldap_ca_cert_path }}"
    ownca_privatekey_path: "{{ ldap_ca_key_path }}"
    ownca_not_after: "+{{ cert_days }}d"

- name: Read CA certificate for distribution
  ansible.builtin.slurp:
    src: "{{ ldap_ca_cert_path }}"
  register: ca_cert_content

- name: Store CA certificate as host fact
  ansible.builtin.set_fact:
    ca_cert_data: "{{ ca_cert_content['content'] | b64decode }}"