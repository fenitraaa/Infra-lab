ldap_domain: eni.local
ldap_org: ENI

cert_dir: /etc/ssl/certs
key_dir: /etc/ssl/private
ca_dir: /etc/ssl/CA

cert_common_name: "ldap.eni.local"
cert_org: "ENI"
cert_country: "MG"
cert_days: 3650

ldap_cert_path: "{{ cert_dir }}/ldap.crt"
ldap_key_path: "{{ key_dir }}/ldap.key"
ldap_ca_cert_path: "{{ ca_dir }}/ca.crt"
ldap_ca_key_path: "{{ ca_dir }}/ca.key"
