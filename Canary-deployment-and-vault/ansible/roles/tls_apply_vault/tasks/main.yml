- name: Apply Vault TLS configuration
  ansible.builtin.template:
    src: vault.hcl.j2
    dest: /etc/vault.d/vault.hcl
    owner: vault
    group: vault
    mode: "0640"

- name: Set VAULT_ADDR in profile
  ansible.builtin.lineinfile:
    path: /etc/profile.d/vault.sh
    line: "export VAULT_ADDR=https://{{ ansible_host }}:8200"
    regexp: "^export VAULT_ADDR="
    create: true
    mode: "0644"

- name: Restart Vault
  ansible.builtin.systemd:
    name: vault
    state: restarted
