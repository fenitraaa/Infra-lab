---
- name: Install and Config postgres
  hosts: db-lab
  become: true
  tags: postgres-installation
  gather_facts: false
  roles:
    - role: db_config

- name: Install and Config HashiCorp Vault
  hosts: vault
  become: true
  tags: vault-installation
  gather_facts: true
  roles:
    - role: vault_config

- name: Vault-1 server configuration using script
  hosts: vault-1
  become: true
  tags: execute_script
  roles:
    - role: execute_script

- name: Distribute TLS certificates to all nodes
  hosts: vault, db-lab, k3s-lab
  become: true
  tags: tls_distribution
  roles:
    - role: tls_config

- name: Apply TLS config for vault
  hosts: vault
  become: true
  tags: tls_apply
  roles:
    - role: tls_apply_vault
